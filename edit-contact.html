<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>edit-contact</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body onload="getContact()" class="bg-light">

    <h1>Please update contact details.</h1>


        <div class="container mt-5">

            <div class="row justify-content-center">
                <div class="col-md-6">

                    <div class="card shadow">
                        <div class="card-body">

                            <h3 class="text-center mb-4">Contact Details</h3>

                            <!-- Avatar -->
                            <div class="text-center mb-3" id="avatarImage"></div>

                            <form id="editForm">

                                <div class="mb-3">
                                    <label class="form-label">First name</label>
                                    <input type="text" class="form-control" id="firstname" name="firstname" readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Last name</label>
                                    <input type="text" class="form-control" id="lastname" name="lastname" readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Mobile</label>
                                    <input type="text" class="form-control" id="mobile" name="mobile" readonly>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" name="email" readonly>
                                </div>

                                <div class="mb-3" id="avatarField" style="display:none;">
                                    <label class="form-label">Change profile image</label>
                                    <input type="file" class="form-control" id="avatar" name="avatar">
                                </div>

                                <!-- Action Buttons -->
                                <div class="d-flex justify-content-between mt-4">
                                    <button type="button" id="homeLink" class="btn btn-secondary">Back</button>
                                    
                                    <div>
                                        <button type="button" id="editContact" class="btn btn-primary">Edit</button>
                                        <button type="submit" id="submitForm" class="btn btn-success" style="display:none;">Save</button>
                                        <button type="button" id="deleteContact" class="btn btn-danger">Delete</button>
                                    </div>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>

        </div>


    <br><br>


    <script src="config.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script>

        var id = getId();

        document.getElementById("homeLink").addEventListener('click', homeLink);
        document.getElementById("editContact").addEventListener('click', editContact);
        document.getElementById("submitForm").addEventListener('click', submitForm);
        document.getElementById("deleteContact").addEventListener('click', deleteContact);

        function getId(){
            var url = window.location.href;
            var pos = url.search("=");
            var id = url.slice(pos + 1);
            return id;
        }

        function getContact(){
            fetch(rootPath + 'controller/get-contacts/?id=' + id)
            .then(function(response){
                return response.json();
            })
            .then(function(data){
                displayOutput(data);

                //display contact info
            })
        }

        function homeLink(){
            window.open("index.html", "_self");
        }

        function displayOutput(data){
            let avatarImg = `
                            <img src="${rootPath}/controller/uploads/${data[0].avatar}" class="rounded-circle shadow" width="120" height="120"/>
                            `
            document.getElementById("avatarImage").innerHTML = avatarImg;

            document.getElementById("firstname").value = data[0].firstname;
            document.getElementById("lastname").value = data[0].lastname;
            document.getElementById("mobile").value = data[0].mobile;
            document.getElementById("email").value = data[0].email;

        }

        function editContact(){
            document.getElementById("firstname").readOnly = false;
            document.getElementById("lastname").readOnly = false;
            document.getElementById("mobile").readOnly = false;
            document.getElementById("email").readOnly = false;
            document.getElementById("avatar").hidden = false;
            document.getElementById("submitForm").hidden = false;

            document.getElementById("avatarField").style.display = "block";
            document.getElementById("submitForm").style.display = "inline-block";

        }

        function submitForm(e){
            e.preventDefault();

            const form = new FormData(document.querySelector("#editForm"));
            form.append('apiKey', apiKey);
            form.append('id', id);

            fetch(rootPath + 'controller/edit-contact/',{
                method: 'POST',
                headers: {'accept': 'application/json, *.*' },
                body: form

            } )
            .then(function(response){
                return response.text();
            })
            .then(function(data){
                if(data == "1"){
                    alert("contact edited")
                    homeLink();
                }else{
                    alert(data);
                    homeLink();
                }
            })


        }


        function deleteContact(){
            var confirmDelete = confirm("Delete contact. Are you sure?");

            if(confirmDelete == true){
                fetch(rootPath + 'controller/delete-contact/?id=' + id)
                .then(function(response){
                    return response.text();
                })
                .then(function(data){
                    if(data == "1"){
                        homeLink();
                    }else{
                        alert(data);
                    }
                })
            }
            

        }






    </script>

    
</body>
</html>
